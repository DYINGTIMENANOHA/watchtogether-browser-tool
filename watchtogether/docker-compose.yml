version: "3.9"

services:
  watchtogether:
    build: ./backend
    container_name: watchtogether
    restart: unless-stopped
    ports:
      - "8892:8892"
      - "9091:9091"
    environment:
      - PORT=8892
      - PROM_PORT=9091
      - CLIENT_TOKEN=${CLIENT_TOKEN:-change-this-token}
      - MAX_ROOMS=10000
      - ROOM_TTL_MINUTES=30
      - MEMBER_TTL_MINUTES=10
      - RATE_LIMIT_PER_MIN=5
      - WS_MAX_PER_IP=20
      - WS_MSG_PER_SEC=10
      - HEARTBEAT_TIMEOUT=60
      - LOG_PRETTY=0
    volumes:
      - ./logs:/app/logs
    networks:
      - wt_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8892/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: wt_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - wt_net

  loki:
    image: grafana/loki:latest
    container_name: wt_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - wt_net

  promtail:
    image: grafana/promtail:latest
    container_name: wt_promtail
    restart: unless-stopped
    volumes:
      - ./logs:/logs
      - ./monitoring/promtail.yml:/etc/promtail/promtail.yml
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - wt_net
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: wt_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
      - ./monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
    networks:
      - wt_net
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  wt_net:
    driver: bridge
